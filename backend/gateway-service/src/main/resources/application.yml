server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
        - id: task-service
          uri: http://localhost:8082
          predicates:
            - Path=/tasks/**
        - id: email-service
          uri: http://localhost:8083
          predicates:
            - Path=/emails/**
        - id: ai-agent-service
          uri: http://localhost:8084
          predicates:
            - Path=/ai/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@ipKeyResolver}"
        - id: document-service
          uri: http://localhost:8085
          predicates:
            - Path=/documents/**
        - id: report-service
          uri: http://localhost:8086
          predicates:
            - Path=/reports/**
        - id: dashboard-service
          uri: http://localhost:8086
          predicates:
            - Path=/dashboard/**
        - id: health-service
          uri: http://localhost:8086
          predicates:
            - Path=/health/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/notifications/**
        - id: workflow-service
          uri: http://localhost:8088
          predicates:
            - Path=/workflows/**
        - id: integrations-service
          uri: http://localhost:8088
          predicates:
            - Path=/integrations/**

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-info:
    title: API Gateway Service
    description: Central API gateway for routing and rate limiting
    version: 1.0.0
    contact:
      name: AI Enterprise Platform Team
    license:
      name: Proprietary

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}