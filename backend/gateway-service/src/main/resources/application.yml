server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://localhost:5174"
            allowedMethods:
              - GET
              - POST
              - PATCH
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
        - id: task-service
          uri: http://localhost:8082
          predicates:
            - Path=/tasks/**
        - id: email-service
          uri: http://localhost:8083
          predicates:
            - Path=/emails/**
        - id: ai-agent-service
          uri: http://localhost:8084
          predicates:
            - Path=/ai/**
        - id: document-service
          uri: http://localhost:8085
          predicates:
            - Path=/documents/**
        - id: report-service
          uri: http://localhost:8086
          predicates:
            - Path=/reports/**
        - id: dashboard-service
          uri: http://localhost:8086
          predicates:
            - Path=/dashboard/**
        - id: health-service
          uri: http://localhost:8086
          predicates:
            - Path=/health/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/notifications/**
        - id: workflow-service
          uri: http://localhost:8088
          predicates:
            - Path=/workflows/**
        - id: integrations-service
          uri: http://localhost:8088
          predicates:
            - Path=/integrations/**

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info