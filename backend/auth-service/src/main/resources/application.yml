server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/aieap
    username: aieap
    password: aieap
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1

security:
  jwt:
    issuer: aieap-auth-service
    secret: ChangeThisSecretForLocalDev1234567890!
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 14

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info