server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    issuer: ${SECURITY_JWT_ISSUER:aieap-auth-service}
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}
    access-token-ttl-minutes: ${SECURITY_JWT_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${SECURITY_JWT_REFRESH_TOKEN_TTL_DAYS:14}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info