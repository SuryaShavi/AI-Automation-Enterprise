server:
  port: 8083

spring:
  application:
    name: email-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        '[spring.json.add.type.headers]': 'false'

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  provider:
    base-url: ${AI_PROVIDER_BASE_URL:http://localhost:11434/v1}
    api-key: ${AI_PROVIDER_API_KEY:ollama}
    model: ${AI_PROVIDER_MODEL:llama3.2}
    embedding-model: ${AI_PROVIDER_EMBEDDING_MODEL:nomic-embed-text}
    max-prompt-chars: ${AI_PROVIDER_MAX_PROMPT_CHARS:12000}
    max-prompt-tokens: ${AI_PROVIDER_MAX_PROMPT_TOKENS:3000}
    max-output-tokens: ${AI_PROVIDER_MAX_OUTPUT_TOKENS:700}