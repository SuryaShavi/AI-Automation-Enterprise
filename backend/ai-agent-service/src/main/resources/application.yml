server:
  port: 8084

spring:
  application:
    name: ai-agent-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      use-key-prefix: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        '[spring.json.add.type.headers]': 'false'
    consumer:
      group-id: ai-agent-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        '[spring.json.trusted.packages]': '*'
        '[spring.json.use.type.headers]': 'false'
        '[spring.json.value.default.type]': 'java.util.HashMap'

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    issuer: ${SECURITY_JWT_ISSUER:aieap-auth-service}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}
    access-token-ttl-minutes: ${SECURITY_JWT_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${SECURITY_JWT_REFRESH_TOKEN_TTL_DAYS:7}

ai:
  provider:
    base-url: ${AI_PROVIDER_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_PROVIDER_API_KEY:}
    api-key-rotation: ${AI_PROVIDER_API_KEY_ROTATION:}
    model: ${AI_PROVIDER_MODEL:gpt-4o-mini}
    embedding-model: ${AI_PROVIDER_EMBEDDING_MODEL:text-embedding-3-small}
    connect-timeout-ms: ${AI_PROVIDER_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_PROVIDER_READ_TIMEOUT_MS:90000}
    max-retries: ${AI_PROVIDER_MAX_RETRIES:2}
    retry-backoff-ms: ${AI_PROVIDER_RETRY_BACKOFF_MS:750}
    max-prompt-chars: ${AI_PROVIDER_MAX_PROMPT_CHARS:12000}
    max-prompt-tokens: ${AI_PROVIDER_MAX_PROMPT_TOKENS:3000}
    max-context-chars: ${AI_PROVIDER_MAX_CONTEXT_CHARS:6000}
    max-context-tokens: ${AI_PROVIDER_MAX_CONTEXT_TOKENS:1600}
    max-output-tokens: ${AI_PROVIDER_MAX_OUTPUT_TOKENS:700}
    planner-max-output-tokens: ${AI_PROVIDER_PLANNER_MAX_OUTPUT_TOKENS:180}
    max-history-messages: ${AI_PROVIDER_MAX_HISTORY_MESSAGES:8}
    max-context-chunks: ${AI_PROVIDER_MAX_CONTEXT_CHUNKS:6}

qdrant:
  base-url: ${QDRANT_BASE_URL:http://localhost:6333}
  collection: ${QDRANT_COLLECTION:aieap-documents}
  vector-size: ${QDRANT_VECTOR_SIZE:768}