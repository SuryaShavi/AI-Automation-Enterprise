server:
  port: 8084

spring:
  application:
    name: ai-agent-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  provider:
    base-url: ${AI_PROVIDER_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_PROVIDER_API_KEY:}
    model: ${AI_PROVIDER_MODEL:gpt-4o-mini}