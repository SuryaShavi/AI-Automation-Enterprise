server:
  port: 8082

spring:
  application:
    name: task-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        '[spring.json.add.type.headers]': 'false'
    consumer:
      group-id: task-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        '[spring.json.trusted.packages]': '*'
        '[spring.json.use.type.headers]': 'false'
        '[spring.json.value.default.type]': 'java.util.HashMap'

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-info:
    title: Task Management Service API
    description: API for task creation, assignment, and workflow management
    version: 1.0.0
    contact:
      name: AI Enterprise Platform Team
    license:
      name: Proprietary

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    issuer: ${SECURITY_JWT_ISSUER:aieap-auth-service}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}