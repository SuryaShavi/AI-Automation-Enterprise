server:
  port: 8088

spring:
  application:
    name: workflow-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info