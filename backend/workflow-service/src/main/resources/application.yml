server:
  port: 8088

spring:
  application:
    name: workflow-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        '[spring.json.add.type.headers]': 'false'

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    issuer: ${SECURITY_JWT_ISSUER:aieap-auth-service}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}