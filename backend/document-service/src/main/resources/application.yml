server:
  port: 8085

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: document-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        '[spring.json.add.type.headers]': 'false'

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  enforce-https: ${SECURITY_ENFORCE_HTTPS:false}
  jwt:
    secret: ${SECURITY_JWT_SECRET:ChangeThisSecretForLocalDev1234567890!}
    issuer: ${SECURITY_JWT_ISSUER:aieap-auth-service}
    previous-secrets: ${SECURITY_JWT_PREVIOUS_SECRETS:}

ai:
  provider:
    api-key: ${AI_PROVIDER_API_KEY:}
    api-key-rotation: ${AI_PROVIDER_API_KEY_ROTATION:}
    model: ${AI_PROVIDER_MODEL:gpt-4o-mini}
    embedding-model: ${AI_PROVIDER_EMBEDDING_MODEL:text-embedding-3-small}
    max-prompt-chars: ${AI_PROVIDER_MAX_PROMPT_CHARS:12000}
    max-prompt-tokens: ${AI_PROVIDER_MAX_PROMPT_TOKENS:3000}

qdrant:
  base-url: ${QDRANT_BASE_URL:http://localhost:6333}
  collection: ${QDRANT_COLLECTION:aieap-documents}
  vector-size: ${QDRANT_VECTOR_SIZE:768}