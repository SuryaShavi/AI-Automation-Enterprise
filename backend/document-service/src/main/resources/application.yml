server:
  port: 8085

spring:
  application:
    name: document-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aieap}
    username: ${SPRING_DATASOURCE_USERNAME:aieap}
    password: ${SPRING_DATASOURCE_PASSWORD:aieap}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      initialization-fail-timeout: -1

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  provider:
    base-url: ${AI_PROVIDER_BASE_URL:http://localhost:11434/v1}
    api-key: ${AI_PROVIDER_API_KEY:ollama}
    model: ${AI_PROVIDER_MODEL:llama3.2}
    embedding-model: ${AI_PROVIDER_EMBEDDING_MODEL:nomic-embed-text}

qdrant:
  base-url: ${QDRANT_BASE_URL:http://localhost:6333}
  collection: ${QDRANT_COLLECTION:aieap-documents}
  vector-size: ${QDRANT_VECTOR_SIZE:3072}